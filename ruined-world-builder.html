<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>World Builder — 廃都市の小さな世界</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌙</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;600&family=Noto+Sans+JP:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="src/styles.css" />
</head>
<body>
  <!-- 3D scene root -->
  <div id="world-root"></div>

  <!-- subtle vignette over world -->
  <div class="world-vignette"></div>

  <!-- React UI overlay -->
  <div id="ui-root"></div>

  <!-- three.js -->
  <script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>

  <!-- React + Babel -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- Store + World (plain JS) -->
  <script src="src/state.js"></script>
  <script src="src/world.js"></script>

  <!-- React components (JSX) -->
  <script type="text/babel" src="src/icons.jsx"></script>
  <script type="text/babel" src="src/topbar.jsx"></script>
  <script type="text/babel" src="src/dock.jsx"></script>
  <script type="text/babel" src="src/tasks.jsx"></script>
  <script type="text/babel" src="src/timer.jsx"></script>
  <script type="text/babel" src="src/shop.jsx"></script>
  <script type="text/babel" src="src/extended-inventory.jsx"></script>
  <script type="text/babel" src="src/shelf-storage.jsx"></script>
  <script type="text/babel" src="src/stats.jsx"></script>
  <script type="text/babel" src="src/settings.jsx"></script>
  <script type="text/babel" src="src/app.jsx"></script>

  <script>
    // Boot: wait for THREE, then init world; React app waits for DOM ready
    function boot() {
      if (!window.THREE) {
        return setTimeout(boot, 50);
      }
      if (!window.React || !window.ReactDOM || !window.__mountApp) {
        return setTimeout(boot, 50);
      }
      window.World.init(document.getElementById('world-root'));
      window.__mountApp();
    }
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', boot);
    } else {
      boot();
    }
  </script>
</body>
</html>
